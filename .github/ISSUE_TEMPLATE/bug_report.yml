name: Bug Report
description: Report a bug, regression, or unexpected behavior in OryCMS.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill out the details below so we can reproduce and fix it faster.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly and concisely.
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the expected result.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: Describe the actual result.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Add screenshots, console output, stack traces, or logs if available.
      render: shell
  - type: input
    id: version
    attributes:
      label: OryCMS version
      description: Which version or commit are you using?
      placeholder: e.g. main, v0.1.0, or a commit SHA
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      description: Where are you running OryCMS?
      options:
        - Local development
        - Docker
        - Self-hosted server
        - Vercel
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment details
      description: Share any relevant OS, browser, database, or runtime details.
      placeholder: e.g. macOS 15, Node 22, Chrome 126, PostgreSQL 16
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context that might help.
